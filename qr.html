.badges{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.badge{background:#FFF3E8;border:1px solid #FFD4A8;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:#2D2D2D;}
